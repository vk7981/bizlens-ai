services:
  - type: web
    name: bizlens-backend
    env: python
    buildCommand: "pip install -r backend/requirements.txt"
    startCommand: "python -m uvicorn backend.main:app --host 0.0.0.0 --port $PORT"
    plan: free
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.8
      - key: GEMINI_API_KEY
        sync: false
      - key: GMAIL_SENDER
        value: aibizlens@gmail.com
      - key: GMAIL_APP_PASSWORD
        sync: false
      - key: DATABASE_URL
        value: sqlite:///./bizlens.db
      - key: UPLOAD_DIR
        value: ./uploads
